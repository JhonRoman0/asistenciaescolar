# URL de conexión (reemplaza 'nombre_tu_bd' por el nombre real)
spring.datasource.url=jdbc:mysql://localhost:3306/asistenciaescolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password_de_prueba}

# Driver de MySQL (opcional en versiones modernas, Spring lo detecta solo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Estrategia de Hibernate para la creación de tablas
# update: actualiza el esquema; create: borra y crea todo al iniciar
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola (útil para desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto para MySQL 8 o superior
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Obliga a Hibernate a usar los nombres exactos definidos en @Table y @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Evita que se intente procesar el nombre antes de aplicar la estrategia física
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl