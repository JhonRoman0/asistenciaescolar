# URL de conexion
spring.datasource.url=jdbc:mysql://mysql:3306/asistenciaescolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Estrategia de Hibernate para la creacion de tablas
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto para MySQL 8 o superior
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Nombres exactos definidos en @Table y @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl