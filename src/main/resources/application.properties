# URL de conexión
spring.datasource.url=jdbc:mysql://localhost:3306/asistenciaescolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso (Ahora apuntan a tu nuevo usuario por defecto)
spring.datasource.username=${DB_USER:JhonRoman0}
spring.datasource.password=${DB_PASSWORD:Jhon751154772@@2}

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Estrategia de Hibernate para la creación de tablas
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto para MySQL 8 o superior
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Obliga a Hibernate a usar los nombres exactos definidos en @Table y @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Evita que se intente procesar el nombre antes de aplicar la estrategia física
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl