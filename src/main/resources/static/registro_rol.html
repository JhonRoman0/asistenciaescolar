<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Rol - Asistencia Escolar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .form-group textarea { height: 80px; resize: none; }
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; border: none; border-radius: 5px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        .btn-submit:hover { background-color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registrar Nuevo Rol</h2>
    <form id="rolForm">
        <div class="form-group">
            <label for="nombreRol">Nombre del Rol:</label>
            <input type="text" id="nombreRol" placeholder="Ej: admin, docente, auxiliar" required>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" placeholder="Breve descripción de las funciones del rol" required></textarea>
        </div>

        <div class="form-group">
            <label for="estado">Estado Inicial:</label>
            <select id="estado">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
            </select>
        </div>

        <div class="form-group">
            <label for="color">Color:</label>
            <textarea id="color" placeholder="Color" required></textarea>
        </div>

        <button type="submit" class="btn-submit">Guardar Rol</button>
        <a href="lista_roles.html" class="back-link">← Ver lista de roles</a>
    </form>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/roles';

    document.getElementById('rolForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Construimos el objeto que espera el dtoRoles en el Backend
        const rolData = {
            nombreRol: document.getElementById('nombreRol').value.trim(),
            descripcion: document.getElementById('descripcion').value.trim(),
            estado: parseInt(document.getElementById('estado').value),
            color: document.getElementById('color').value
        };

        try {
            const response = await fetch(API_URL, { // Según tu RolesController @PostMapping
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(rolData)
            });

            if (response.ok) {
                alert("✅ Rol registrado exitosamente");
                document.getElementById('rolForm').reset();
            } else {
                const errorMsg = await response.text();
                alert("❌ Error al guardar: " + errorMsg);
            }
        } catch (error) {
            console.error("Error de conexión:", error);
            alert("❌ No se pudo conectar con el servidor");
        }
    });
</script>

</body>
</html>
