<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Alumnos - Asistencia Escolar</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark: #343a40; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }

        /* Cabecera */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h2 { color: var(--dark); margin: 0; }

        /* Barra de búsqueda profesional */
        .search-bar { display: flex; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .search-bar input, .search-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; min-width: 150px; }
        .search-bar input { flex-grow: 1; }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: var(--primary); color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }
        tr:hover { background-color: #f9f9f9; }

        /* Botones */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; text-decoration: none; font-size: 13px; display: inline-block; }
        .btn-search { background-color: var(--primary); color: white; }
        .btn-search:hover { background-color: #0056b3; }
        .btn-add { background-color: var(--success); color: white; }
        .btn-edit { background-color: var(--warning); color: #212529; margin-right: 5px; }
        .btn-delete { background-color: var(--danger); color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Estados */
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; text-transform: uppercase; }
        .badge-1 { background-color: #d4edda; color: #155724; } /* Activo */
        .badge-2 { background-color: #f8d7da; color: #721c24; } /* Eliminado */
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Panel de Gestión de Alumnos</h2>
        <a href="registro_alumno.html" class="btn btn-add">+ Registrar Nuevo</a>
    </div>

    <!-- Filtros: Sin eventos onchange/onkeyup para evitar consumo excesivo -->
    <div class="search-bar">
        <input type="text" id="txtNombre" placeholder="Buscar por nombre o apellido...">

        <select id="selGrado">
            <option value="">Todos los Grados</option>
        </select>

        <select id="selSeccion">
            <option value="">Todas las Secciones</option>
        </select>

        <select id="selEstado">
            <option value="1">Activos</option>
            <option value="2">Dados de Baja</option>
            <option value="">Todos los Estados</option>
        </select>

        <button class="btn btn-search" id="btnBuscar" onclick="buscarAlumnos()">🔍 Buscar</button>
    </div>

    <table id="tablaAlumnos">
        <thead>
        <tr>
            <th>Código Único</th>
            <th>Alumno</th>
            <th>Grado</th>
            <th>Sección</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <!-- Datos cargados dinámicamente -->
        </tbody>
    </table>
</div>

<script>
    // Al cargar la página solo llenamos los catálogos de los filtros
    document.addEventListener('DOMContentLoaded', () => {
        cargarFiltros();
        // Opcional: buscarAlumnos(); // Descomenta si quieres ver la lista al entrar

        // Soporte para buscar presionando Enter en el teclado
        document.getElementById('txtNombre').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') buscarAlumnos();
        });
    });

    async function cargarFiltros() {
        try {
            const [resG, resS] = await Promise.all([
                fetch('http://localhost:8080/api/alumnos/grados'),
                fetch('http://localhost:8080/api/alumnos/secciones')
            ]);

            const grados = await resG.json();
            const secciones = await resS.json();

            const sg = document.getElementById('selGrado');
            grados.forEach(g => sg.innerHTML += `<option value="${g.idGrado}">${g.grado}</option>`);

            const ss = document.getElementById('selSeccion');
            secciones.forEach(s => ss.innerHTML += `<option value="${s.idSeccion}">${s.seccion}</option>`);
        } catch (error) {
            console.error("Error cargando filtros:", error);
        }
    }

    async function buscarAlumnos() {
        const btn = document.getElementById('btnBuscar');
        const nombre = document.getElementById('txtNombre').value;
        const grado = document.getElementById('selGrado').value;
        const seccion = document.getElementById('selSeccion').value;
        const estado = document.getElementById('selEstado').value;

        btn.disabled = true;
        btn.innerText = "Buscando...";

        // Petición única al servidor
        const url = `http://localhost:8080/api/alumnos?nombre=${nombre}&idGrado=${grado}&idSeccion=${seccion}&estado=${estado}`;

        try {
            const res = await fetch(url);
            const alumnos = await res.json();

            const tbody = document.querySelector('#tablaAlumnos tbody');
            tbody.innerHTML = '';

            if(alumnos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No se encontraron resultados.</td></tr>';
            }

            alumnos.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${a.codigoUnico}</strong></td>
                    <td>${a.nombre} ${a.apellidoPaterno} ${a.apellidoMaterno}</td>
                    <td>${a.grado.grado}</td>
                    <td>${a.seccion.seccion}</td>
                    <td><span class="badge badge-${a.estado}">${a.estado === 1 ? 'Activo' : 'Baja'}</span></td>
                    <td>
                        <button class="btn btn-edit" onclick="editar(${a.idAlumno})">Editar</button>
                        ${a.estado === 1 ? `<button class="btn btn-delete" onclick="eliminar(${a.idAlumno})">Baja</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            alert("Error de conexión con el servidor");
        } finally {
            btn.disabled = false;
            btn.innerText = "🔍 Buscar";
        }
    }

    async function eliminar(id) {
        if (!confirm("¿Seguro que deseas dar de baja a este alumno?")) return;

        const res = await fetch(`http://localhost:8080/api/alumnos/${id}`, { method: 'DELETE' });
        if (res.ok) {
            alert("Alumno desactivado correctamente.");
            buscarAlumnos(); // Refrescamos la búsqueda actual
        }
    }

    function editar(id) {
        window.location.href = `registro_alumno.html?id=${id}`;
    }
</script>
</body>
</html>
