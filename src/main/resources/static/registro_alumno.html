<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Alumno</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        input[readonly] { background-color: #e9ecef; color: #666; font-weight: bold; }
        .btn-guardar { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-guardar:hover { background-color: #218838; }
        .volver { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="tituloForm">Registrar Nuevo Alumno</h2>
    <form id="formAlumno">
        <input type="hidden" id="idAlumno">

        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Ej. Jhon" required>
        </div>
        <div class="form-group">
            <label>Apellido Paterno:</label>
            <input type="text" id="apellidoPaterno" placeholder="Ej. Román" required>
        </div>
        <div class="form-group">
            <label>Apellido Materno:</label>
            <input type="text" id="apellidoMaterno" placeholder="Ej. Quito" required>
        </div>

        <!-- El código ahora es puramente informativo, el Back lo genera -->
        <div class="form-group" id="contenedorCodigo" style="display: none;">
            <label>Código Único Asignado:</label>
            <input type="text" id="codigoUnico" readonly>
        </div>

        <div class="form-group">
            <label>Grado:</label>
            <select id="idGrado" required>
                <option value="">Seleccione Grado</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sección:</label>
            <select id="idSeccion" required>
                <option value="">Seleccione Sección</option>
            </select>
        </div>

        <button type="submit" class="btn-guardar" id="btnAccion">Guardar Alumno</button>
    </form>
    <a href="lista_alumno.html" class="volver">← Volver al listado</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const alumnoId = urlParams.get('id');

    document.addEventListener('DOMContentLoaded', async () => {
        await cargarCatalogos();

        if (alumnoId) {
            document.getElementById('tituloForm').innerText = "Editar Alumno";
            document.getElementById('btnAccion').innerText = "Actualizar Cambios";
            document.getElementById('contenedorCodigo').style.display = "block"; // Mostrar solo en edición
            await cargarDatosAlumno(alumnoId);
        }
    });

    async function cargarCatalogos() {
        try {
            const [resG, resS] = await Promise.all([
                fetch('http://localhost:8080/api/alumnos/grados'),
                fetch('http://localhost:8080/api/alumnos/secciones')
            ]);
            const grados = await resG.json();
            const secciones = await resS.json();

            const selG = document.getElementById('idGrado');
            grados.forEach(g => selG.innerHTML += `<option value="${g.idGrado}">${g.grado}</option>`);

            const selS = document.getElementById('idSeccion');
            secciones.forEach(s => selS.innerHTML += `<option value="${s.idSeccion}">${s.seccion}</option>`);
        } catch (e) { console.error("Error catálogos", e); }
    }

    async function cargarDatosAlumno(id) {
        const res = await fetch(`http://localhost:8080/api/alumnos/${id}`);
        const a = await res.json();

        document.getElementById('idAlumno').value = a.idAlumno;
        document.getElementById('nombre').value = a.nombre;
        document.getElementById('apellidoPaterno').value = a.apellidoPaterno;
        document.getElementById('apellidoMaterno').value = a.apellidoMaterno;
        document.getElementById('codigoUnico').value = a.codigoUnico;
        document.getElementById('idGrado').value = a.grado.idGrado;
        document.getElementById('idSeccion').value = a.seccion.idSeccion;
    }

    document.getElementById('formAlumno').addEventListener('submit', async (e) => {
        e.preventDefault();

        const datos = {
            nombre: document.getElementById('nombre').value,
            apellidoPaterno: document.getElementById('apellidoPaterno').value,
            apellidoMaterno: document.getElementById('apellidoMaterno').value,
            idGrado: parseInt(document.getElementById('idGrado').value),
            idSeccion: parseInt(document.getElementById('idSeccion').value),
            // No enviamos codigoUnico si es nuevo, el Back lo crea
            ...(alumnoId && { codigoUnico: document.getElementById('codigoUnico').value })
        };

        const url = alumnoId ? `http://localhost:8080/api/alumnos/${alumnoId}` : `http://localhost:8080/api/alumnos`;
        const metodo = alumnoId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                const resultado = await response.json();
                alert(alumnoId ? "Actualizado con éxito" : `Registrado. Código asignado: ${resultado.codigoUnico}`);
                window.location.href = 'lista_alumno.html';
            } else {
                alert("Error en el servidor al procesar la solicitud.");
            }
        } catch (error) {
            alert("Error de conexión.");
        }
    });
</script>
</body>
</html>
