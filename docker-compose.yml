version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      # Aunque borraste el root del '%' (acceso externo), Docker necesita esta variable inicial
      MYSQL_ROOT_PASSWORD: Jhon751154772@@2
      MYSQL_DATABASE: asistenciaescolar
      # Configuramos tu nuevo usuario administrador aquí
      MYSQL_USER: JhonRoman0
      MYSQL_PASSWORD: Jhon751154772@@2
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  springboot-app:
    image: jairodrigo/asistenciaescolar:latest
    container_name: springboot-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/asistenciaescolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      # Le pasamos tus credenciales reales a Spring Boot
      DB_USER: JhonRoman0
      DB_PASSWORD: Jhon751154772@@2
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge