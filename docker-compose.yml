version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password_de_prueba
      MYSQL_DATABASE: asistenciaescolar
      MYSQL_USER: usuario
      MYSQL_PASSWORD: password_de_prueba
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  springboot-app:
    image: jairodrigo/asistenciaescolar:latest
    container_name: springboot-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/asistenciaescolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: usuario
      DB_PASSWORD: password_de_prueba
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge